<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blockly Pygame Zero Example</title>
  <style>
    body {
      background-color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: row;
      height: 100vh;
      margin: 0;
      padding: 0;
    }
    #blocklyDiv {
      height: 100%;
      width: 70%;
    }
    #sidebar {
      height: 100%;
      width: 30%;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #ccc;
    }
    #sidebar h2 {
      margin: 10px;
      padding: 0;
      font-size: 1.2em;
      border-bottom: 1px solid #ccc;
    }
    #pythonCode {
      flex: 1;
      margin: 10px;
      padding: 10px;
      background-color: #272822;
      color: #f8f8f2;
      font-family: monospace;
      white-space: pre-wrap;
      overflow-y: auto;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="blocklyDiv"></div>
  <div id="sidebar">
    <h2>Python Output</h2>
    <div id="pythonCode"></div>
  </div>
  
  <script src="./dist/index.js"></script>
</body>
</html>
